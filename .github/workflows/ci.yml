name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop

jobs:
  # -------------------
  # 1️⃣ CI - Run Tests
  # -------------------
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 20

      - run: npm ci
      - run: npm test

  # -------------------
  # 2️⃣ Deploy to Staging (develop branch)
  # -------------------
  deploy-staging:
    if: github.ref == 'refs/heads/develop'
    needs: test
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v3

      - run: npm install

      - name: Start/Restart Staging App
        shell: powershell
        run: |
          $process = pm2 list | Select-String "taskflow-staging"
          if ($process) {
              pm2 restart taskflow-staging
          } else {
              $env:PORT=4000
              pm2 start src/server.js --name taskflow-staging --env staging
          }

  # -------------------
  # 3️⃣ Deploy to Production (main branch)
  # -------------------
  deploy-production:
    if: github.ref == 'refs/heads/main'
    needs: test
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v3

      - run: npm install

      - name: Start/Restart Production App
        shell: powershell
        run: |
          $process = pm2 list | Select-String "taskflow-production"
          if ($process) {
              pm2 restart taskflow-production
          } else {
              pm2 start src/server.js --name taskflow-production
          }
