name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  # -------------------
  # 1️⃣ CI - Run Tests
  # -------------------
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # -------------------
  # 2️⃣ CD - Deploy
  # -------------------
  deploy:
    needs: test
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: npm install

      - name: Restart app with PM2 (PowerShell safe)
        shell: powershell
        run: |
          $process = pm2 list | Select-String "taskflow-api"
          if ($process) {
              pm2 restart taskflow-api
          } else {
              pm2 start src/server.js --name taskflow-api
          }
